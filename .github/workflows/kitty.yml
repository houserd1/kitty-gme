name: Kitty Daily Score

on:
  schedule:
    # 21:30 UTC every weekday. That is 5:30 PM ET in EDT and 4:30 PM ET in EST.
    # GitHub Actions cron runs in UTC and does not auto-adjust for DST.
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      always_push:
        description: 'Send push regardless of score'
        type: boolean
        default: true
      alert_threshold:
        description: 'Override alert threshold (default 51)'
        type: string
        default: '51'

permissions:
  contents: write

concurrency:
  group: kitty
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Kitty
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          ARGS="--alert-threshold ${{ inputs.alert_threshold || '51' }}"
          # Cron sets inputs.always_push to empty; default to always push.
          if [ "${{ inputs.always_push }}" != "false" ]; then
            ARGS="$ARGS --always-push"
          fi
          python kitty.py $ARGS

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json history.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "kitty: $(date -u +%Y-%m-%d) score update"

          # main can move between checkout and push (re-runs of older SHAs,
          # other commits landing). Retry a few times. On conflict we keep
          # the local commit's data.json / history.json since today's run is
          # the freshest snapshot.
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt. Fetching and rebasing..."
            git fetch origin main
            if ! git rebase --strategy-option=theirs origin/main; then
              echo "Rebase failed. Aborting."
              git rebase --abort || true
              exit 1
            fi
          done
          echo "Push failed after 3 attempts."
          exit 1
